<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Maxsus scrollbar dizayni */
        .custom-scrollbar::-webkit-scrollbar { height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-full bg-gray-950 font-sans antialiased text-slate-300">

<div class="flex h-full">
    <div class="flex w-72 flex-col border-r border-white/10 bg-gray-900 shrink-0">
        <div class="px-6 pt-6 pb-4">
            <h2 class='text-white text-2xl font-semibold tracking-tight'>Techniques crm</h2>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a href="{% url 'home' %}" class="flex items-center gap-3 rounded-lg bg-white/10 px-3 py-2 text-sm font-medium text-white">
                <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                </svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
                <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
                </svg>
                Team
            </a>
        </nav>
        <div class="border-t border-white/10 p-4">
            <a href="#" class="flex items-center gap-3">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="size-8 rounded-full ring-2 ring-white/10"/>
                <span class="text-sm font-medium text-white">Tom Cook</span>
            </a>
        </div>
    </div>




<div class="min-h-screen bg-[#030712] flex items-center justify-center p-6 antialiased" style="margin-left: 200px;">


    <div class="relative w-full max-w-2xl bg-[#0f172a] border border-white/5 rounded-[2.5rem] overflow-hidden transition-all duration-500">
        
        <div class="p-8 md:p-10 flex flex-col md:flex-row items-center md:items-start gap-10">
            
            <div class="flex-shrink-0 flex flex-col items-center gap-4">
                <div class="relative">
                    <div class="w-36 h-36 rounded-3xl bg-[#1e293b] border border-cyan-500/20 p-1 flex items-center justify-center overflow-hidden">
                        <svg class="w-16 h-16 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-emerald-500 border-4 border-[#0f172a] rounded-full animate-pulse"></div>
                </div>
                <p class="text-[10px] font-black tracking-[0.2em] text-slate-500 uppercase">Hodim profili</p>
            </div>

            <div class="flex-grow w-full space-y-6">


                <div class="text-center md:text-left space-y-1">
                    <h1 class="text-3xl font-bold text-white tracking-tight">
                        {{hr.first_name}}<span class="text-cyan-500">    {{hr.last_name}}</span>
                    </h1>
                </div>                
 
                <div class="space-y-3">
                    
                    <div class="bg-[#1e293b]/40 py-3 px-5 rounded-2xl border border-white/5 hover:bg-[#1e293b]/60 transition-colors">
                        <p class="text-[9px] font-bold text-cyan-500/70 uppercase tracking-widest mb-0.5">Telefon raqam</p>
                        <p class="text-base font-semibold text-slate-200">{{hr.phone_number}}</p>
                    </div>

                    <div class="bg-[#1e293b]/40 py-3 px-5 rounded-2xl border border-white/5 hover:bg-[#1e293b]/60 transition-colors">
                        <p class="text-[9px] font-bold text-cyan-500/70 uppercase tracking-widest mb-0.5">Kasbi</p>
                        <p class="text-base font-semibold text-slate-200">{{hr.profession}}</p>
                    </div>

                    <div class="bg-[#1e293b]/40 py-3 px-5 rounded-2xl border border-white/5 hover:bg-[#1e293b]/60 transition-colors flex justify-between items-center">
                        <div>
                            <p class="text-[9px] font-bold text-cyan-500/70 uppercase tracking-widest mb-0.5">Ish holati</p>
                            <p class="text-base font-semibold text-slate-200">Faol</p>
                        </div>
                        <span class="px-3 py-1 bg-emerald-500/10 text-emerald-500 text-[10px] font-black rounded-lg border border-emerald-500/20">
                            ONLINE
                        </span>
                    </div>

                </div>
            <div class="pt-2">
<button class="w-full py-4 bg-cyan-600 hover:bg-cyan-500














</body>
