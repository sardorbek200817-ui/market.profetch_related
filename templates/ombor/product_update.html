<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Maxsus scrollbar dizayni */
        .custom-scrollbar::-webkit-scrollbar { height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-full bg-gray-950 font-sans antialiased text-slate-300">

<div class="flex h-full">
    <div class="flex w-72 flex-col border-r border-white/10 bg-gray-900 shrink-0">
        <div class="px-6 pt-6 pb-4">
            <h2 class='text-white text-2xl font-semibold tracking-tight'>Techniques crm</h2>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a href="{% url 'home' %}" class="flex items-center gap-3 rounded-lg bg-white/10 px-3 py-2 text-sm font-medium text-white">
                <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                </svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-gray-400 hover:bg-white/5 hover:text-white transition-colors">
                <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
                </svg>
                Team
            </a>
        </nav>
        <div class="border-t border-white/10 p-4">
            <a href="#" class="flex items-center gap-3">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="" class="size-8 rounded-full ring-2 ring-white/10"/>
                <span class="text-sm font-medium text-white">Tom Cook</span>
            </a>
        </div>
    </div>








<div class="max-w-md mx-auto mt-10">
    <div class="bg-gray-900 border border-white/10 rounded-2xl shadow-2xl p-6 backdrop-blur-sm">
        
        <form action="{% url 'product_update' product.id %}" method="POST" class="space-y-5">
            {% csrf_token %}

            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Mahsulot nomi</label>
                <input type="text" name="name" 
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Rasm yuklash</label>
                <input type="file" name="image"  
                    class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-600/20 file:text-blue-400 hover:file:bg-blue-600/30 file:cursor-pointer transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Birlik</label>
                    <select name="unit" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 appearance-none">
                        <option value="l" class="bg-gray-900">Litr</option>
                        <option value="piece" class="bg-gray-900">Dona</option>
                        <option value="box" class="bg-gray-900">Quti</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Miqdori</label>
                    <input type="number" name="amount" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                </div>
            </div>

            <button type="submit" 
                class="w-full mt-2 px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl
                       transition-all duration-200 transform hover:scale-[1.02] active:scale-95
                       shadow-lg shadow-blue-500/20 border border-blue-400/20 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                
                <a href="{% url 'ombor' %}">Saqlash</a>
            </button>
            
        </form>
    </div>
</div>
 

















</div>

</body> 
</html>
